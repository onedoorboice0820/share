<div id="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--deep-blue)">分享好物</h2>
        <button onclick="closeModal()" style="border:none; background:none; font-size:24px;">✕</button>
    </div>
    <input type="text" id="f-img-url" placeholder="請貼上圖片網址 (如 Imgur 連結)" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;" oninput="previewImg()">
    <div id="img-preview-box" style="width:100%; height:150px; background:#eee; border-radius:10px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
        <span id="preview-placeholder" style="color:#aaa;">圖片預覽</span>
        <img id="img-preview" src="" style="display:none; width:100%; height:100%; object-fit:cover;">
    </div>
    
    <select id="f-cat" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;"></select>
    <input type="text" id="f-name" placeholder="物品名稱" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
    <input type="text" id="f-usage" placeholder="用途 (例如：約會必備)" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
    <textarea id="f-note" placeholder="詳細備註 (長按卡片可查看)" rows="4" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;"></textarea>
    <button onclick="uploadItem()" id="btn-publish" style="width:100%; background:var(--deep-blue); color:white; padding:15px; border:none; border-radius:15px; font-weight:bold;">發布</button>
</div>

<script>
    // 1. 初始化 Firebase (保持原樣，但移除 Storage 相關操作)
    const firebaseConfig = {
        apiKey: "AIzaSyBrWae6zXn7mx7YGXONm9BquB44fWYbd6c",
        authDomain: "door-nomoney.firebaseapp.com",
        projectId: "door-nomoney",
        storageBucket: "door-nomoney.firebasestorage.app",
        messagingSenderId: "571731542037",
        appId: "1:571731542037:web:9bfb339497524425d60e1c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const categories = [
        { name: '彩妝', icon: '💄' }, { name: '保養', icon: '🧴' }, { name: '保健', icon: '💊' },
        { name: '演唱會', icon: '🎤' }, { name: '小物', icon: '🎁' }, { name: '其他知識', icon: '💡' }
    ];

    let currentCategory = '';
    let allData = [];
    let selectedItems = new Set();
    let longPressTimer;

    function initMenus() {
        const homeMenu = document.getElementById('home-menu');
        const bottomMenu = document.getElementById('bottom-menu');
        const fCat = document.getElementById('f-cat');
        homeMenu.innerHTML = ''; bottomMenu.innerHTML = ''; fCat.innerHTML = '';

        categories.forEach(cat => {
            homeMenu.innerHTML += `<div class="menu-card" onclick="showCategory('${cat.name}')"><span class="menu-icon">${cat.icon}</span><span class="menu-text">${cat.name}</span></div>`;
            bottomMenu.innerHTML += `<div class="nav-item" onclick="showCategory('${cat.name}')">${cat.icon}<div>${cat.name}</div></div>`;
            fCat.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
        });
    }

    function showCategory(name) {
        currentCategory = name;
        document.getElementById('home-page').classList.remove('active');
        document.getElementById('category-page').classList.add('active');
        fetchData();
    }

    function showHome() {
        document.getElementById('home-page').classList.add('active');
        document.getElementById('category-page').classList.remove('active');
    }

    function fetchData() {
        db.collection("items").where("category", "==", currentCategory)
          .orderBy("likes", "desc").orderBy("createdAt", "desc")
          .onSnapshot(snapshot => {
              allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              renderItems();
          });
    }

    function renderItems() {
        const container = document.getElementById('items-container');
        const search = document.getElementById('search').value.toLowerCase();
        container.innerHTML = '';
        
        allData.filter(item => item.name.toLowerCase().includes(search) || item.usage.toLowerCase().includes(search))
        .forEach(item => {
            const isLiked = localStorage.getItem('like_' + item.id);
            const isSelected = selectedItems.has(item.id);
            container.innerHTML += `
                <div class="item-card ${isSelected?'selected':''}" 
                     onclick="handleCardClick('${item.id}', '${item.note}')"
                     onmousedown="startPress('${item.id}')" onmouseup="endPress()" ontouchstart="startPress('${item.id}')" ontouchend="endPress()">
                    <div class="item-title">${item.name}</div>
                    <img class="item-img" src="${item.imgUrl || 'https://via.placeholder.com/150'}">
                    <div class="item-info">
                        <span>${item.usage}</span>
                        <span onclick="event.stopPropagation(); toggleLike('${item.id}', ${item.likes})">
                            ${isLiked?'❤️':'🤍'} ${item.likes}
                        </span>
                    </div>
                </div>`;
        });
    }

    // 方案 A 特有的預覽功能
    function previewImg() {
        const url = document.getElementById('f-img-url').value;
        const img = document.getElementById('img-preview');
        const placeholder = document.getElementById('preview-placeholder');
        if(url) {
            img.src = url; img.style.display = 'block'; placeholder.style.display = 'none';
        } else {
            img.style.display = 'none'; placeholder.style.display = 'block';
        }
    }

    async function uploadItem() {
        const imgUrl = document.getElementById('f-img-url').value;
        const name = document.getElementById('f-name').value;
        const usage = document.getElementById('f-usage').value;
        const note = document.getElementById('f-note').value;
        const category = document.getElementById('f-cat').value;
        const btn = document.getElementById('btn-publish');

        if(!imgUrl || !name) return alert("請填寫物品名稱並貼上圖片網址");

        btn.disabled = true; btn.innerText = "發布中...";

        try {
            await db.collection("items").add({
                name, usage, note, category, imgUrl, 
                likes: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("發布成功！");
            closeModal();
            // 清空欄位
            document.getElementById('f-img-url').value = '';
            document.getElementById('f-name').value = '';
            document.getElementById('f-usage').value = '';
            document.getElementById('f-note').value = '';
            previewImg();
        } catch (e) {
            alert("發布失敗，請檢查 Firestore 規則！");
            console.error(e);
        } finally {
            btn.disabled = false; btn.innerText = "發布";
        }
    }

    // 其他邏輯保持不變 (toggleLike, handleCardClick, copyToClipboard 等)
    function toggleLike(id, count) {
        if(localStorage.getItem('like_' + id)) return alert("你已經點過讚囉！");
        db.collection("items").doc(id).update({ likes: count + 1 });
        localStorage.setItem('like_' + id, true);
    }
    function handleCardClick(id, note) {
        if (selectedItems.size > 0) toggleSelect(id);
        else alert("備註資訊：\n" + note);
    }
    function startPress(id) {
        longPressTimer = setTimeout(() => {
            toggleSelect(id);
            if(navigator.vibrate) navigator.vibrate(50);
        }, 600);
    }
    function endPress() { clearTimeout(longPressTimer); }
    function toggleSelect(id) {
        if(selectedItems.has(id)) selectedItems.delete(id);
        else selectedItems.add(id);
        renderItems();
    }
    function copyToClipboard() {
        const list = allData.filter(i => selectedItems.has(i.id))
                           .map(i => `${i.name} (用途：${i.usage})`).join('\n');
        if(!list) return alert("請先長按選取物品！");
        navigator.clipboard.writeText("我的購物清單：\n" + list);
        alert("已複製到剪貼簿！可直接貼到 LINE 囉！");
        selectedItems.clear(); renderItems();
    }
    function showAddForm() { document.getElementById('modal').style.display = 'block'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

// 確保 DOM 樹完全載入後再執行
window.onload = function() {
    initMenus();
};
